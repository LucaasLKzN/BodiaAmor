<div class="login-container">
  <div class="login-card">
    <h1 class="logo">Te<span>Love</span></h1>
    <p class="subtitle">Acesso restrito. Qual a senha?</p>
    <p class="hint">(Dica: O dia que a gente começou a namorar)</p>

    <div class="input-group">
      <input
        type="password"
        placeholder="DDMMAAAA"
        [(ngModel)]="password"
        (keyup.enter)="entrar()"
      />
    </div>

    @if (showError) {
      <p class="error-msg">Hmm... tem certeza? Tente de novo! 🤨</p>
    }

    <button class="btn-spotify" (click)="entrar()">
      Entrar
    </button>
  </div>
</div>
